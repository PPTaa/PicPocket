<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PicPocket - 스마트 스크린샷 보관함</title>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Mode Tokens */
            --bg-primary: #F8FAFC;
            --bg-secondary: #FFFFFF;
            --text-primary: #1E293B;
            --text-secondary: #64748B;
            --accent-primary: #2563EB;
            --accent-secondary: #3B82F6;
            --cta-color: #F97316;
            --border-color: #E2E8F0;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --safe-area-inset-top: env(safe-area-inset-top);
            --safe-area-inset-bottom: env(safe-area-inset-bottom);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* Dark Mode Tokens (OLED Optimized) */
                --bg-primary: #000000;
                --bg-secondary: #0F172A;
                --text-primary: #F8FAFC;
                --text-secondary: #94A3B8;
                --accent-primary: #3B82F6;
                --accent-secondary: #60A5FA;
                --border-color: #1E293B;
                --card-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.5);
            }
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-size: 16px;
            line-height: 1.5;
            overflow-x: hidden;
            user-select: none;
        }

        /* Layout */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        header {
            padding: calc(var(--safe-area-inset-top) + 20px) 20px 10px;
            background-color: var(--bg-primary);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px 100px;
            scroll-behavior: smooth;
        }

        /* Components: Library Grid */
        .category-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 20px;
        }

        .category-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s ease, background-color 0.2s ease;
            cursor: pointer;
        }

        .category-card:active {
            transform: scale(0.96);
        }

        .category-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            background-color: var(--bg-primary);
        }

        .category-card h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }

        .category-card p {
            margin: 4px 0 0;
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Components: Scan Phase */
        .scan-view {
            display: none; /* Hidden by default */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%;
        }

        .scan-view.active {
            display: flex;
        }

        .scan-orb {
            width: 200px;
            height: 200px;
            border-radius: 100px;
            background: radial-gradient(circle at 30% 30%, var(--accent-secondary), var(--accent-primary));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px var(--accent-primary);
            position: relative;
            margin-bottom: 40px;
        }

        .scan-orb::after {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 2px solid var(--accent-primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        .scan-progress {
            font-size: 32px;
            font-weight: 700;
            color: white;
        }

        /* Components: Search */
        .search-view {
            display: none;
            padding-top: 10px;
        }

        .search-view.active {
            display: block;
        }

        .search-bar {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-bar input {
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            flex: 1;
            font-size: 16px;
        }

        /* Navigation */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 10px 20px calc(var(--safe-area-inset-bottom) + 10px);
            display: flex;
            justify-content: space-around;
            max-width: 500px;
            margin: 0 auto;
            z-index: 20;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s ease;
            width: 60px;
        }

        .nav-item.active {
            color: var(--accent-primary);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
        }

        .nav-item span {
            font-size: 11px;
            font-weight: 500;
        }

        /* Icons (SVG) */
        .icon-stroke { stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

<div class="app-container">
    <header id="app-header">
        <div class="header-top">
            <h1 id="title-text">보관함</h1>
            <svg class="icon-stroke" style="width: 24px; height: 24px;"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        </div>
    </header>

    <div class="main-content" id="main-content">
        <!-- Library View -->
        <div id="view-library" class="view active">
            <div class="category-grid">
                <div class="category-card">
                    <div class="category-icon" style="color: #F97316;"><svg class="icon-stroke" style="width: 24px; height: 24px;"><path d="M21 8H3M21 16H3M8 12h8"/></svg></div>
                    <h3>쿠폰</h3>
                    <p>12개의 항목</p>
                </div>
                <div class="category-card">
                    <div class="category-icon" style="color: #10B981;"><svg class="icon-stroke" style="width: 24px; height: 24px;"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M7 15h0M2 9.5h20"/></svg></div>
                    <h3>영수증</h3>
                    <p>8개의 항목</p>
                </div>
                <div class="category-card">
                    <div class="category-icon" style="color: #3B82F6;"><svg class="icon-stroke" style="width: 24px; height: 24px;"><path d="M21 10V8a2 2 0 00-2-2H5a2 2 0 00-2 2v2M3 14v2a2 2 0 002 2h14a2 2 0 002-2v-2M3 10a2 2 0 012 2v0a2 2 0 01-2 2M21 10a2 2 0 00-2 2v0a2 2 0 002 2"/></svg></div>
                    <h3>티켓</h3>
                    <p>3개의 항목</p>
                </div>
                <div class="category-card">
                    <div class="category-icon" style="color: #8B5CF6;"><svg class="icon-stroke" style="width: 24px; height: 24px;"><path d="M21 10l-3-3m0 0l-3 3m3-3v12M3 14l3 3m0 0l3-3m-3 3V5"/></svg></div>
                    <h3>배송</h3>
                    <p>5개의 항목</p>
                </div>
            </div>
        </div>

        <!-- Scan View -->
        <div id="view-scan" class="scan-view view">
            <div class="scan-orb">
                <div class="scan-progress" id="scan-pct">0%</div>
            </div>
            <h2 style="margin: 0; font-size: 20px;">스크린샷 분석 중...</h2>
            <p style="color: var(--text-secondary); margin: 10px 0 40px;">기기 내에서 안전하게 분류하고 있습니다.</p>
            <button id="start-scan-btn" style="background-color: var(--accent-primary); color: white; border: none; padding: 16px 32px; border-radius: 12px; font-weight: 600; font-size: 16px; width: 100%; cursor: pointer;">최근 1년 스캔 시작</button>
        </div>

        <!-- Search View -->
        <div id="view-search" class="search-view view">
            <div class="search-bar">
                <svg class="icon-stroke" style="width: 20px; height: 20px;"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input type="text" placeholder="쿠폰번호, 주소, 상품명 검색" id="search-input">
            </div>
            <div id="search-results">
                <p style="color: var(--text-secondary); text-align: center; margin-top: 40px;">검색어를 입력해 스크린샷 속<br>텍스트를 찾아보세요.</p>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchView('library')">
            <svg class="icon-stroke"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <span>보관함</span>
        </div>
        <div class="nav-item" onclick="switchView('scan')">
            <svg class="icon-stroke"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2M7 12h10"/></svg>
            <span>스캔</span>
        </div>
        <div class="nav-item" onclick="switchView('search')">
            <svg class="icon-stroke"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <span>검색</span>
        </div>
        <div class="nav-item">
            <svg class="icon-stroke"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            <span>설정</span>
        </div>
    </nav>
</div>

<script>
    function switchView(viewId) {
        // Update Title
        const titles = { 'library': '보관함', 'scan': '스캔', 'search': '검색' };
        document.getElementById('title-text').innerText = titles[viewId];

        // Update Views
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');

        // Update Nav
        document.querySelectorAll('.nav-item').forEach((item, idx) => {
            const navViews = ['library', 'scan', 'search', 'settings'];
            item.classList.toggle('active', navViews[idx] === viewId);
        });

        if (viewId === 'scan') {
            document.querySelector('.scan-view').style.display = 'flex';
        } else {
            document.querySelector('.scan-view').style.display = 'none';
        }
    }

    // Dummy Scan Logic
    document.getElementById('start-scan-btn').addEventListener('click', function() {
        this.style.display = 'none';
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 5) + 1;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                setTimeout(() => switchView('library'), 500);
            }
            document.getElementById('scan-pct').innerText = progress + '%';
        }, 100);
    });
</script>

</body>
</html>
